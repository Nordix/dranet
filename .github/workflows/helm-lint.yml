name: Helm Lint
on:
  pull_request:
    branches: [ main ]
    paths:
      - 'deployments/helm/**'
      - '.github/workflows/helm-lint.yml'

permissions:
  contents: read

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Helm lint
        run: make helm-lint
